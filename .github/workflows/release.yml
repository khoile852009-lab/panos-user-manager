name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller openpyxl

      - name: Generate Windows version info
        shell: python
        run: |
          import os
          ref = os.environ.get('GITHUB_REF_NAME', 'v1.0.0').lstrip('v')
          parts = (ref.split('.') + ['0', '0', '0', '0'])[:4]
          tup = ', '.join(parts)
          content = f"""VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=({tup}),
              prodvers=({tup}),
              mask=0x3f, flags=0x0, OS=0x40004,
              fileType=0x1, subtype=0x0, date=(0, 0)
            ),
            kids=[
              StringFileInfo([StringTable(u'040904B0', [
                StringStruct(u'CompanyName',      u'The Cyber Defenders'),
                StringStruct(u'FileDescription',  u'PAN-OS User Manager'),
                StringStruct(u'FileVersion',      u'{ref}'),
                StringStruct(u'InternalName',     u'panos_manage_user'),
                StringStruct(u'LegalCopyright',   u'\\u00a9 2026 The Cyber Defenders'),
                StringStruct(u'OriginalFilename', u'panos_manage_user.exe'),
                StringStruct(u'ProductName',      u'PAN-OS User Manager'),
                StringStruct(u'ProductVersion',   u'{ref}'),
              ])]),
              VarFileInfo([VarStruct(u'Translation', [0x0409, 1200])])
            ]
          )"""
          with open('version_info.txt', 'w') as f:
              f.write(content)

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name panos_manage_user
          --icon cd.ico
          --version-file version_info.txt
          --clean
          panos_manage_user.py

      - name: Sign binary (Authenticode)
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://cus.codesigning.azure.net/
          trusted-signing-account-name: The-Cyber-Defenders
          certificate-profile-name: Github-Action
          files-folder: dist
          files-folder-filter: exe

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: panos_manage_user-windows.exe
          path: dist/panos_manage_user.exe
          retention-days: 1

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller openpyxl

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name panos_manage_user
          --clean
          panos_manage_user.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: panos_manage_user-linux
          path: dist/panos_manage_user
          retention-days: 1

  # sign-windows job disabled pending SignPath open-source account upgrade

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: panos_manage_user-windows.exe
          path: artifacts/windows/

      - name: Download Linux binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: panos_manage_user-linux
          path: artifacts/linux/

      - name: Prepare release files
        run: |
          mkdir dist
          mv artifacts/windows/panos_manage_user.exe dist/panos_manage_user-windows.exe
          mv artifacts/linux/panos_manage_user dist/panos_manage_user-linux
          chmod +x dist/panos_manage_user-linux

      - name: Sign release binaries
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --detach-sign --armor dist/panos_manage_user-windows.exe
          gpg --batch --yes --detach-sign --armor dist/panos_manage_user-linux
          mv dist/panos_manage_user-windows.exe.asc dist/panos_manage_user-windows.exe.sig
          mv dist/panos_manage_user-linux.asc dist/panos_manage_user-linux.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## PAN-OS User Manager ${{ github.ref_name }}

            Manage local admin accounts on PAN-OS firewalls and Panorama via the XML API.

            ### Downloads

            | Platform | File | Signature |
            |----------|------|-----------|
            | Windows  | `panos_manage_user-windows.exe` | `panos_manage_user-windows.exe.sig` |
            | Linux    | `panos_manage_user-linux` | `panos_manage_user-linux.sig` |

            ### Verify signatures

            ```bash
            # Import the public key (first time only)
            gpg --keyserver keys.openpgp.org --recv-keys 8E234342277586D9

            # Verify Windows binary
            gpg --verify panos_manage_user-windows.exe.sig panos_manage_user-windows.exe

            # Verify Linux binary
            gpg --verify panos_manage_user-linux.sig panos_manage_user-linux
            ```

            ### Quick start

            **Windows**
            ```
            panos_manage_user-windows.exe --firewall hosts.txt --auth admin --operation list
            ```

            **Linux**
            ```
            chmod +x panos_manage_user-linux
            ./panos_manage_user-linux --firewall hosts.txt --auth admin --operation list
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full usage.
          files: |
            dist/panos_manage_user-windows.exe
            dist/panos_manage_user-linux
            dist/panos_manage_user-windows.exe.sig
            dist/panos_manage_user-linux.sig
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
