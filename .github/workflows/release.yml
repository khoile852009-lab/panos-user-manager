name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: panos_manage_user.exe
            asset_name: panos_manage_user-windows.exe
          - os: ubuntu-latest
            artifact_name: panos_manage_user
            asset_name: panos_manage_user-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Generate Windows version info
        if: matrix.os == 'windows-latest'
        shell: python
        run: |
          import os
          ref = os.environ.get('GITHUB_REF_NAME', 'v1.0.0').lstrip('v')
          parts = (ref.split('.') + ['0', '0', '0', '0'])[:4]
          tup = ', '.join(parts)
          content = f"""VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=({tup}),
              prodvers=({tup}),
              mask=0x3f, flags=0x0, OS=0x40004,
              fileType=0x1, subtype=0x0, date=(0, 0)
            ),
            kids=[
              StringFileInfo([StringTable(u'040904B0', [
                StringStruct(u'CompanyName',      u'The Cyber Defenders'),
                StringStruct(u'FileDescription',  u'PAN-OS User Manager'),
                StringStruct(u'FileVersion',      u'{ref}'),
                StringStruct(u'InternalName',     u'panos_manage_user'),
                StringStruct(u'LegalCopyright',   u'\\u00a9 2026 The Cyber Defenders'),
                StringStruct(u'OriginalFilename', u'panos_manage_user.exe'),
                StringStruct(u'ProductName',      u'PAN-OS User Manager'),
                StringStruct(u'ProductVersion',   u'{ref}'),
              ])]),
              VarFileInfo([VarStruct(u'Translation', [0x0409, 1200])])
            ]
          )"""
          with open('version_info.txt', 'w') as f:
              f.write(content)

      - name: Build binary (Windows)
        if: matrix.os == 'windows-latest'
        run: >
          pyinstaller
          --onefile
          --name panos_manage_user
          --icon cd.ico
          --version-file version_info.txt
          --clean
          panos_manage_user.py

      - name: Build binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: >
          pyinstaller
          --onefile
          --name panos_manage_user
          --clean
          panos_manage_user.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 1

  sign-windows:
    name: Sign Windows Binary
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: panos-user-manager
          signing-policy-slug: release-signing
          artifact-configuration-slug: exe
          github-artifact-id: panos_manage_user-windows.exe
          wait-for-completion: true
          output-artifact-directory: signed/

      - name: Upload signed exe
        uses: actions/upload-artifact@v4
        with:
          name: panos_manage_user-windows-signed.exe
          path: signed/panos_manage_user.exe
          retention-days: 1

  release:
    name: Create Release
    needs: sign-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download signed Windows binary
        uses: actions/download-artifact@v4
        with:
          name: panos_manage_user-windows-signed.exe
          path: artifacts/windows/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: panos_manage_user-linux
          path: artifacts/linux/

      - name: Prepare release files
        run: |
          mkdir dist
          mv artifacts/windows/panos_manage_user.exe dist/panos_manage_user-windows.exe
          mv artifacts/linux/panos_manage_user dist/panos_manage_user-linux
          chmod +x dist/panos_manage_user-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## PAN-OS User Manager ${{ github.ref_name }}

            Manage local admin accounts on PAN-OS firewalls and Panorama via the XML API.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `panos_manage_user-windows.exe` |
            | Linux    | `panos_manage_user-linux` |

            ### Quick start

            **Windows**
            ```
            panos_manage_user-windows.exe --firewall hosts.txt --auth admin --operation list
            ```

            **Linux**
            ```
            chmod +x panos_manage_user-linux
            ./panos_manage_user-linux --firewall hosts.txt --auth admin --operation list
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full usage.
          files: |
            dist/panos_manage_user-windows.exe
            dist/panos_manage_user-linux
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
